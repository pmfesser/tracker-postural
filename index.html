const WEEK_PLAN = ["A","B","A","B","C"];
const DAY_LABELS = ["Lun","Mar","Mié","Jue","Vie"];

// ── MOTIVATION ENGINE ─────────────────────────────────────────────────────────
function getMotivation(data) {
  const totalDone = Object.values(data).filter(Boolean).length;
  const totalSessions = WEEKS * 5;
  const pct = Math.round((totalDone / totalSessions) * 100);

  // Streak: consecutive completed weeks
  let streak = 0;
  for (let w = 1; w <= WEEKS; w++) {
    if (WEEK_PLAN.every((_, i) => data[`${w}-${i}`])) streak = w;
    else break;
  }

  // Sessions this week (current week)
  let currentWeek = 1;
  for (let w = 1; w <= WEEKS; w++) {
    if (!WEEK_PLAN.every((_, i) => data[`${w}-${i}`])) { currentWeek = w; break; }
    if (w === WEEKS) currentWeek = WEEKS;
  }
  const thisWeekDone = WEEK_PLAN.filter((_, i) => data[`${currentWeek}-${i}`]).length;

  // Level system
  let level, levelLabel, levelColor, levelEmoji, message, subMessage;

  if (totalDone === 0) {
    level = 0; levelLabel = "Sin iniciar"; levelColor = "#475569"; levelEmoji = "🌱";
    message = "Tu viaje empieza hoy.";
    subMessage = "La primera sesión es la más importante. Pulsa Iniciar.";
  } else if (pct < 10) {
    level = 1; levelLabel = "Despertando"; levelColor = "#64748b"; levelEmoji = "🌿";
    message = "Has dado el primer paso.";
    subMessage = "Tu cuerpo ya está aprendiendo el camino.";
  } else if (pct < 25) {
    level = 2; levelLabel = "Construyendo hábito"; levelColor = "#0ea5e9"; levelEmoji = "💧";
    message = streak >= 2 ? `${streak} semanas seguidas. El hábito se está formando.` : "Vas bien. La constancia es la clave.";
    subMessage = "En estas semanas el sistema nervioso aprende los patrones posturales.";
  } else if (pct < 40) {
    level = 3; levelLabel = "En racha"; levelColor = "#2563eb"; levelEmoji = "⚡";
    message = "Ya notas la diferencia, aunque sea sutil.";
    subMessage = streak >= 3 ? `🔥 ${streak} semanas perfectas. Eso no es fácil.` : "Sigue. El cambio estructural está llegando.";
  } else if (pct < 55) {
    level = 4; levelLabel = "Transformación activa"; levelColor = "#7c3aed"; levelEmoji = "🔥";
    message = "Estás en la zona de cambio real.";
    subMessage = "Tu postura en reposo ya es diferente. Aunque no siempre lo notes, tu cuerpo sí.";
  } else if (pct < 70) {
    level = 5; levelLabel = "Máquina"; levelColor = "#16a34a"; levelEmoji = "💪";
    message = "Más de la mitad del camino. Eso es carácter.";
    subMessage = "A estas alturas el Turkish Get-Up ya debería sentirse diferente.";
  } else if (pct < 85) {
    level = 6; levelLabel = "Élite"; levelColor = "#d97706"; levelEmoji = "🏅";
    message = "Muy pocos llegan aquí. Tú sí.";
    subMessage = "Tu columna torácica tiene movilidad que no tenía hace semanas. Eso no se borra.";
  } else if (pct < 100) {
    level = 7; levelLabel = "Imparable"; levelColor = "#f59e0b"; levelEmoji = "🌟";
    message = "La recta final. Ya eres otra persona.";
    subMessage = "Lo que has construido en 12 semanas dura toda la vida si lo mantienes.";
  } else {
    level = 8; levelLabel = "Completado"; levelColor = "#fbbf24"; levelEmoji = "🏆";
    message = "Lo hiciste. 12 semanas. 60 sesiones.";
    subMessage = "Ahora esto es quien eres, no lo que haces.";
  }

  // Weekly message
  let weekMsg = null;
  if (thisWeekDone === 5) weekMsg = { icon:"🔥", text:"Semana perfecta" };
  else if (thisWeekDone === 4) weekMsg = { icon:"💪", text:"Una más y semana perfecta" };
  else if (thisWeekDone === 3) weekMsg = { icon:"👍", text:"Buen ritmo esta semana" };
  else if (thisWeekDone >= 1) weekMsg = { icon:"▶️", text:"Semana en marcha" };

  return { level, levelLabel, levelColor, levelEmoji, message, subMessage, streak, pct, weekMsg };
}

// ── GOOGLE SHEETS SYNC ────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const r = await fetch(SCRIPT_URL + "?t=" + Date.now());
    const json = await r.json();
    // Convert string "true"/"false" from sheets
    const out = {};
    Object.entries(json).forEach(([k,v]) => { out[k] = v === true || v === "true"; });
    localStorage.setItem(LOCAL_KEY, JSON.stringify(out));
    return out;
  } catch {
    const cached = localStorage.getItem(LOCAL_KEY);
    return cached ? JSON.parse(cached) : {};
  }
}

async function pushData(patch) {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(patch));
  try {
    await fetch(SCRIPT_URL, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(patch)
    });
  } catch {}
}

// ── CIRCLE TIMER ──────────────────────────────────────────────────────────────
function CircleTimer({ seconds, total, color, size=110 }) {
  const r = size * 0.38;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - (seconds / total));
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
        strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
        style={{transition:"stroke-dashoffset 0.9s linear"}}/>
    </svg>
  );
}

function StretchTimer({ duration, color }) {
  const [t, setT] = useState(duration);
  useEffect(() => {
    const id = setInterval(() => setT(p => Math.max(0, p-1)), 1000);
    return () => clearInterval(id);
  }, []);
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginTop:24}}>
      <div style={{position:"relative",width:90,height:90}}>
        <CircleTimer seconds={t} total={duration} color={t>0?color:"#16a34a"} size={90}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:"800",color:t>0?color:"#16a34a"}}>
          {t>0?t:"✓"}
        </div>
      </div>
    </div>
  );
}

// ── AUDIO ENGINE ─────────────────────────────────────────────────────────────
function useBeep() {
  const ctxRef = useRef(null);
  function getCtx() {
    if (!ctxRef.current) ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctxRef.current;
  }
  function beep(freq, dur, vol=0.18, type="sine") {
    try {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + dur);
    } catch {}
  }
  // Soft countdown beep (low tone)
  function beepTick() { beep(440, 0.12, 0.12); }
  // Final GO beep (higher, longer, pleasant)
  function beepGo() {
    beep(660, 0.08, 0.15); 
    setTimeout(() => beep(880, 0.18, 0.18), 90);
    setTimeout(() => beep(1100, 0.35, 0.20), 200);
  }
  // Rest start (soft low)
  function beepRest() { beep(330, 0.25, 0.12); }
  return { beepTick, beepGo, beepRest };
}

// ── WORKOUT SESSION ───────────────────────────────────────────────────────────
function WorkoutSession({ block, weekNum, onFinish, onBack }) {
  const W = WORKOUTS[block];
  const [phase, setPhase] = useState("warmup");
  const [warmupIdx, setWarmupIdx] = useState(0);
  const [round, setRound] = useState(1);
  const [exIdx, setExIdx] = useState(0);
  const [stretchIdx, setStretchIdx] = useState(0);
  const [timer, setTimer] = useState(0);
  const [timerTotal, setTimerTotal] = useState(0);
  const [prepCount, setPrepCount] = useState(7);
  const [isResting, setIsResting] = useState(false);
  const [paused, setPaused] = useState(false);
  const intRef = useRef(null);
  const exRef = useRef(0);
  const roundRef = useRef(1);
  const pausedRef = useRef(false);
  const resumeCallbackRef = useRef(null);
  const timerRef = useRef(0);
  const { beepTick, beepGo, beepRest } = useBeep();

  const totalEx = W.circuit.exercises.length;
  const totalRounds = W.circuit.rounds;
  const isTimed = W.circuit.timed;

  function clearInt() { if (intRef.current) { clearInterval(intRef.current); intRef.current = null; } }

  function togglePause(currentCb) {
    const nowPaused = !pausedRef.current;
    pausedRef.current = nowPaused;
    setPaused(nowPaused);
    if (nowPaused) {
      clearInt();
    } else {
      // Resume — restart interval from current timer value
      if (resumeCallbackRef.current) resumeCallbackRef.current();
    }
  }

  function startPrep(cb) {
    setPhase("prep"); setPrepCount(7);
    let c = 7; clearInt(); pausedRef.current = false; setPaused(false);
    resumeCallbackRef.current = () => {
      intRef.current = setInterval(() => {
        if (pausedRef.current) return;
        c--;
        // Beep on last 3 counts
        if (c === 3) beepTick();
        else if (c === 2) beepTick();
        else if (c === 1) beepTick();
        else if (c === 0) beepGo();
        setPrepCount(c);
        if (c <= 0) { clearInt(); cb(); }
      }, 1000);
    };
    resumeCallbackRef.current();
  }

  function startWork(ei, ri) {
    const dur = W.circuit.work;
    setPhase("circuit"); setIsResting(false);
    setTimer(dur); setTimerTotal(dur);
    timerRef.current = dur;
    let t = dur; clearInt(); pausedRef.current = false; setPaused(false);
    resumeCallbackRef.current = () => {
      intRef.current = setInterval(() => {
        if (pausedRef.current) return;
        t--; timerRef.current = t; setTimer(t);
        if (t <= 0) { clearInt(); startRestWork(ei, ri); }
      }, 1000);
    };
    resumeCallbackRef.current();
  }

  function startRestWork(ei, ri) {
    const dur = W.circuit.rest;
    beepRest();
    setIsResting(true); setTimer(dur); setTimerTotal(dur);
    timerRef.current = dur;
    let t = dur; clearInt(); pausedRef.current = false; setPaused(false);
    resumeCallbackRef.current = () => {
      intRef.current = setInterval(() => {
        if (pausedRef.current) return;
        t--; timerRef.current = t; setTimer(t);
        if (t <= 0) { clearInt(); advance(ei, ri); }
      }, 1000);
    };
    resumeCallbackRef.current();
  }

  function advance(ei, ri) {
    const nextEi = ei + 1;
    if (nextEi >= totalEx) {
      const nextRi = ri + 1;
      if (nextRi >= totalRounds) { setPhase("stretch"); setStretchIdx(0); }
      else {
        setRound(nextRi+1); roundRef.current = nextRi+1;
        setExIdx(0); exRef.current = 0;
        startPrep(() => startWork(0, nextRi));
      }
    } else {
      setExIdx(nextEi); exRef.current = nextEi;
      startPrep(() => startWork(nextEi, ri));
    }
  }

  useEffect(() => () => clearInt(), []);

  function handleNext() {
    if (phase==="warmup") {
      if (warmupIdx < W.warmup.length-1) { setWarmupIdx(i=>i+1); return; }
      startPrep(() => { if (isTimed) startWork(0,0); else setPhase("circuit"); });
      return;
    }
    if (phase==="circuit") {
      if (isTimed && isResting) { clearInt(); pausedRef.current=false; setPaused(false); advance(exIdx, round-1); return; }
      if (!isTimed) {
        const nextEi = exIdx+1;
        if (nextEi >= totalEx) {
          const nextRi = round;
          if (nextRi >= totalRounds) { setPhase("stretch"); setStretchIdx(0); }
          else { setRound(nextRi+1); setExIdx(0); startPrep(()=>setPhase("circuit")); }
        } else { setExIdx(nextEi); startPrep(()=>setPhase("circuit")); }
      }
      return;
    }
    if (phase==="stretch") {
      if (stretchIdx < W.stretches.length-1) setStretchIdx(i=>i+1);
      else setPhase("done");
    }
  }

  const showPauseBtn = (phase==="prep" || phase==="circuit") && isTimed;

  const ex = W.circuit.exercises[exIdx];
  const stretch = W.stretches[stretchIdx];
  const pct = phase==="done"?100:phase==="warmup"?5:phase==="stretch"?85+(stretchIdx/W.stretches.length)*15:
    10+((round-1)/totalRounds+exIdx/(totalEx*totalRounds))*75;

  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"48px 20px 12px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.08)",borderRadius:20,padding:"6px 14px",color:"#94a3b8",fontSize:13}}>← Salir</button>
        <div style={{flex:1}}>
          <div style={{height:4,background:"rgba(255,255,255,0.08)",borderRadius:99}}>
            <div style={{height:"100%",width:`${pct}%`,background:W.color,borderRadius:99,transition:"width 0.5s"}}/>
          </div>
        </div>
        {showPauseBtn && (
          <button onClick={togglePause} style={{background:paused?"rgba(245,158,11,0.2)":"rgba(255,255,255,0.08)",border:`1px solid ${paused?"rgba(245,158,11,0.5)":"rgba(255,255,255,0.12)"}`,borderRadius:20,padding:"6px 16px",color:paused?"#f59e0b":"#94a3b8",fontSize:13,fontWeight:"700",transition:"all 0.2s"}}>
            {paused ? "▶ Reanudar" : "⏸ Pausa"}
          </button>
        )}
        <div style={{fontSize:12,color:"#64748b"}}>S{weekNum}</div>
      </div>

      {paused && (
        <div style={{margin:"0 24px",padding:"14px 18px",borderRadius:14,background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:20}}>⏸</div>
          <div>
            <div style={{fontSize:13,fontWeight:"700",color:"#f59e0b"}}>En pausa</div>
            <div style={{fontSize:11,color:"#94a3b8"}}>Ajusta el material y pulsa Reanudar cuando estés listo</div>
          </div>
        </div>
      )}

      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"12px 24px 40px"}}>

        {phase==="warmup" && (
          <div style={{flex:1,display:"flex",flexDirection:"column"}} className="fade">
            <div style={{fontSize:10,letterSpacing:3,color:"#64748b",textTransform:"uppercase",marginBottom:24}}>Calentamiento · {warmupIdx+1}/{W.warmup.length}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <div style={{fontSize:34,fontWeight:"800",lineHeight:1.1,marginBottom:12}}>{W.warmup[warmupIdx].name}</div>
              <div style={{fontSize:24,color:W.color,fontWeight:"700",marginBottom:8}}>{W.warmup[warmupIdx].reps}</div>
              <div style={{fontSize:15,color:"#64748b"}}>{W.warmup[warmupIdx].note}</div>
            </div>
            {warmupIdx < W.warmup.length-1 && <div style={{fontSize:12,color:"#334155",marginBottom:12,textAlign:"center"}}>Siguiente: {W.warmup[warmupIdx+1].name}</div>}
            <button onClick={handleNext} style={{width:"100%",padding:"18px",borderRadius:16,fontSize:17,fontWeight:"700",background:W.color,color:"#fff"}}>
              {warmupIdx < W.warmup.length-1 ? "Siguiente →" : "Empezar circuito →"}
            </button>
          </div>
        )}

        {phase==="prep" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}} className="fade">
            <div style={{fontSize:12,letterSpacing:3,color:"#64748b",textTransform:"uppercase",marginBottom:32}}>
              {prepCount <= 3 && prepCount > 0 ? "¡Ahora!" : "Prepárate"}
            </div>
            <div style={{position:"relative",width:110,height:110}}>
              <CircleTimer seconds={prepCount} total={7} color={prepCount<=3?W.color:"#64748b"}/>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:prepCount<=3?52:44,fontWeight:"900",color:prepCount<=3?W.color:"#94a3b8",transition:"all 0.15s"}}>
                {prepCount<=0?"GO!":prepCount}
              </div>
            </div>
            {ex && <div style={{marginTop:28,fontSize:20,fontWeight:"700",textAlign:"center"}}>{ex.name}</div>}
          </div>
        )}

        {phase==="circuit" && isTimed && (
          <div style={{flex:1,display:"flex",flexDirection:"column"}} className="fade">
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontSize:10,letterSpacing:3,color:"#64748b",textTransform:"uppercase"}}>Ronda {round}/{totalRounds} · {exIdx+1}/{totalEx}</div>
              <div style={{fontSize:10,fontWeight:"700",color:isResting?"#f59e0b":W.color,textTransform:"uppercase",letterSpacing:2}}>{isResting?"DESCANSO":"TRABAJO"}</div>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              {!isResting && (<>
                <div style={{fontSize:12,color:"#475569",marginBottom:4}}>{ex.eq}</div>
                <div style={{fontSize:28,fontWeight:"800",lineHeight:1.1,marginBottom:12}}>{ex.name}</div>
                <ExerciseVideo driveId={ex.video}/>
                <div style={{fontSize:14,color:"#94a3b8",lineHeight:1.6,marginBottom:16}}>{ex.cue}</div>
              </>)}
              {isResting && <div style={{fontSize:18,fontWeight:"700",color:"#f59e0b",marginBottom:28,textAlign:"center"}}>{exIdx+1<totalEx?`Siguiente: ${W.circuit.exercises[exIdx+1].name}`:round<totalRounds?`Ronda ${round+1} 💪`:"Último ejercicio 🔥"}</div>}
              <div style={{display:"flex",justifyContent:"center"}}>
                <div style={{position:"relative",width:110,height:110}}>
                  <CircleTimer seconds={timer} total={timerTotal} color={isResting?"#f59e0b":W.color}/>
                  <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,fontWeight:"900",color:isResting?"#f59e0b":W.color}}>{timer}</div>
                </div>
              </div>
            </div>
            {isResting && <button onClick={handleNext} style={{width:"100%",padding:"16px",borderRadius:16,fontSize:14,fontWeight:"700",background:"rgba(255,255,255,0.06)",color:"#94a3b8",border:"1px solid rgba(255,255,255,0.1)",marginTop:20}}>Saltar descanso →</button>}
          </div>
        )}

        {phase==="circuit" && !isTimed && (
          <div style={{flex:1,display:"flex",flexDirection:"column"}} className="fade">
            <div style={{fontSize:10,letterSpacing:3,color:"#64748b",textTransform:"uppercase",marginBottom:20}}>Ronda {round}/{totalRounds} · {exIdx+1}/{totalEx}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <div style={{fontSize:12,color:"#475569",marginBottom:4}}>{ex.eq}</div>
              <div style={{fontSize:28,fontWeight:"800",lineHeight:1.1,marginBottom:10}}>{ex.name}</div>
              <ExerciseVideo driveId={ex.video}/>
              <div style={{fontSize:22,color:W.color,fontWeight:"700",marginBottom:14}}>{ex.reps}</div>
              <div style={{fontSize:14,color:"#94a3b8",lineHeight:1.6}}>{ex.cue}</div>
            </div>
            {(exIdx+1<totalEx||round<totalRounds) && <div style={{fontSize:12,color:"#334155",marginBottom:10,textAlign:"center"}}>{exIdx+1<totalEx?`Siguiente: ${W.circuit.exercises[exIdx+1].name}`:`Ronda ${round+1}`}</div>}
            <button onClick={handleNext} style={{width:"100%",padding:"18px",borderRadius:16,fontSize:17,fontWeight:"700",background:W.color,color:"#fff"}}>
              {(exIdx+1<totalEx||round<totalRounds)?"Hecho →":"Terminar circuito →"}
            </button>
          </div>
        )}

        {phase==="stretch" && (
          <div style={{flex:1,display:"flex",flexDirection:"column"}} className="fade">
            <div style={{fontSize:10,letterSpacing:3,color:"#64748b",textTransform:"uppercase",marginBottom:20}}>Estiramientos · {stretchIdx+1}/{W.stretches.length}</div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <div style={{fontSize:28,fontWeight:"800",lineHeight:1.1,marginBottom:10}}>{stretch.name}</div>
              <div style={{fontSize:22,color:"#f59e0b",fontWeight:"700",marginBottom:8}}>{stretch.dur}s</div>
              <div style={{fontSize:14,color:"#94a3b8",lineHeight:1.6}}>{stretch.note}</div>
              <StretchTimer duration={stretch.dur} color={W.color} key={stretchIdx}/>
            </div>
            <button onClick={handleNext} style={{width:"100%",padding:"18px",borderRadius:16,fontSize:17,fontWeight:"700",background:stretchIdx<W.stretches.length-1?W.color:"#16a34a",color:"#fff",marginTop:20}}>
              {stretchIdx<W.stretches.length-1?"Siguiente →":"Finalizar sesión ✓"}
            </button>
          </div>
        )}

        {phase==="done" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center"}} className="fade">
            <div style={{fontSize:72,marginBottom:20,animation:"heartbeat 1s ease infinite"}}>🎯</div>
            <div style={{fontSize:28,fontWeight:"800",marginBottom:8}}>Sesión completada</div>
            <div style={{fontSize:15,color:"#64748b",marginBottom:48}}>{W.label} · Semana {weekNum}</div>
            <button onClick={onFinish} style={{padding:"18px 48px",borderRadius:20,fontSize:17,fontWeight:"700",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff"}}>
              Guardar y volver ✓
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MOTIVATION CARD ───────────────────────────────────────────────────────────
function MotivationCard({ data }) {
  const m = getMotivation(data);
  return (
    <div style={{margin:"0 24px 20px",padding:"18px 20px",borderRadius:18,background:`linear-gradient(135deg, ${m.levelColor}22, ${m.levelColor}0a)`,border:`1px solid ${m.levelColor}44`,animation:m.level>=6?"glow 2s ease infinite":"none"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{fontSize:32}}>{m.levelEmoji}</div>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:m.levelColor,textTransform:"uppercase",fontWeight:"700"}}>{m.levelLabel}</div>
          {m.streak > 0 && <div style={{fontSize:11,color:"#f59e0b",marginTop:2}}>🔥 {m.streak} {m.streak===1?"semana":"semanas"} seguidas</div>}
        </div>
        {m.weekMsg && (
          <div style={{marginLeft:"auto",fontSize:11,color:"#f59e0b",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:20,padding:"4px 10px",textAlign:"center"}}>
            {m.weekMsg.icon} {m.weekMsg.text}
          </div>
        )}
      </div>
      <div style={{fontSize:17,fontWeight:"700",color:"#f1f5f9",marginBottom:4}}>{m.message}</div>
      <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.5}}>{m.subMessage}</div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [screen, setScreen] = useState("home");
  const [sessBlock, setSessBlock] = useState(null);
  const [sessWeek, setSessWeek] = useState(null);
  const [activeWeek, setActiveWeek] = useState(1);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    // Load from cache immediately, then fetch from Sheets
    const cached = localStorage.getItem(LOCAL_KEY);
    if (cached) { try { setData(JSON.parse(cached)); } catch {} }
    fetchData().then(d => { setData(d); setLoading(false); });
  }, []);

  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(null), 3200); }

  async function markDone(week, di) {
    const key = `${week}-${di}`;
    const next = { ...data, [key]: !data[key] };
    setData(next);
    setSyncing(true);
    await pushData(next);
    setSyncing(false);
    const ms = MILESTONES.find(m=>m.week===week);
    if (!data[key] && ms && WEEK_PLAN.every((_,i)=>next[`${week}-${i}`]))
      showToast(`${ms.icon} ${ms.text}`);
  }

  function startSession(week, di) { setSessBlock(WEEK_PLAN[di]); setSessWeek(week); setScreen("session"); }

  async function finishSession() {
    const di = WEEK_PLAN.indexOf(sessBlock);
    await markDone(sessWeek, di);
    setScreen("home"); showToast("✅ Sesión guardada en Google Sheets");
  }

  const totalDone = Object.values(data).filter(Boolean).length;
  const pct = Math.round((totalDone/(WEEKS*5))*100);
  const currentWeek = (() => { for (let w=1;w<=WEEKS;w++) if (!WEEK_PLAN.every((_,i)=>data[`${w}-${i}`])) return w; return WEEKS; })();

  if (screen==="session")
    return <WorkoutSession block={sessBlock} weekNum={sessWeek} onFinish={finishSession} onBack={()=>setScreen("home")}/>;

  if (loading)
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{width:36,height:36,border:"3px solid rgba(255,255,255,0.1)",borderTop:"3px solid #2563eb",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
        <div style={{fontSize:14,color:"#64748b"}}>Cargando desde Google Sheets…</div>
      </div>
    );

  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",paddingBottom:48}}>
      {toast && (
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#1a1a2e",padding:"12px 24px",borderRadius:40,fontWeight:"700",fontSize:14,zIndex:9999,boxShadow:"0 8px 32px rgba(245,158,11,0.4)",animation:"fadeIn 0.3s ease",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{padding:"52px 24px 16px",background:"linear-gradient(180deg,rgba(37,99,235,0.12) 0%,transparent 100%)"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:10,letterSpacing:4,color:"#475569",textTransform:"uppercase",marginBottom:6}}>Plan Postural · 12 Semanas</div>
            <div style={{fontSize:26,fontWeight:"700",marginBottom:2}}>Tu entrenamiento</div>
            <div style={{fontSize:13,color:"#64748b"}}>Semana {currentWeek} de {WEEKS}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8}}>
            {syncing
              ? <div style={{width:8,height:8,borderRadius:"50%",background:"#f59e0b",animation:"heartbeat 1s ease infinite"}}/>
              : <div style={{width:8,height:8,borderRadius:"50%",background:"#16a34a"}}/>
            }
            <span style={{fontSize:10,color:"#475569"}}>{syncing?"Guardando…":"Sincronizado"}</span>
          </div>
        </div>
      </div>

      {/* Progress */}
      <div style={{padding:"0 24px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:12,color:"#64748b"}}>{totalDone} / {WEEKS*5} sesiones</span>
          <span style={{fontSize:12,color:"#64748b",fontWeight:"700"}}>{pct}%</span>
        </div>
        <div style={{height:5,background:"rgba(255,255,255,0.08)",borderRadius:99}}>
          <div style={{height:"100%",width:`${pct}%`,borderRadius:99,background:"linear-gradient(90deg,#2563eb,#16a34a,#d97706)",transition:"width 0.6s"}}/>
        </div>
      </div>

      {/* Motivation Card */}
      <MotivationCard data={data}/>

      {/* Milestones */}
      <div style={{padding:"0 24px 20px",display:"flex",gap:8}}>
        {MILESTONES.map(ms => {
          const reached = WEEK_PLAN.every((_,i)=>data[`${ms.week}-${i}`]);
          return (
            <div key={ms.week} style={{flex:1,textAlign:"center",padding:"10px 4px",borderRadius:12,background:reached?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.03)",border:`1px solid ${reached?"rgba(245,158,11,0.35)":"rgba(255,255,255,0.06)"}`,animation:reached?"glow 2s ease infinite":"none"}}>
              <div style={{fontSize:18}}>{reached?ms.icon:"○"}</div>
              <div style={{fontSize:9,color:reached?"#f59e0b":"#334155",marginTop:3}}>S{ms.week}</div>
            </div>
          );
        })}
      </div>

      {/* Week pills */}
      <div style={{padding:"0 24px 16px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#475569",textTransform:"uppercase",marginBottom:10}}>Semanas</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {[...Array(WEEKS)].map((_,wi) => {
            const w = wi+1;
            const done = WEEK_PLAN.every((_,i)=>data[`${w}-${i}`]);
            const started = WEEK_PLAN.some((_,i)=>data[`${w}-${i}`]);
            const isAct = activeWeek===w;
            return (
              <button key={w} onClick={()=>setActiveWeek(w)} style={{width:40,height:40,borderRadius:10,fontSize:13,fontWeight:"700",background:isAct?(done?"#16a34a":"#2563eb"):done?"rgba(22,163,74,0.2)":started?"rgba(37,99,235,0.15)":"rgba(255,255,255,0.04)",color:isAct?"#fff":done?"#4ade80":started?"#60a5fa":"#475569",border:`1px solid ${isAct?"transparent":done?"rgba(22,163,74,0.3)":"rgba(255,255,255,0.06)"}`,transition:"all 0.15s"}}>
                {done?"✓":w}
              </button>
            );
          })}
        </div>
      </div>

      {/* Day cards */}
      <div style={{padding:"0 24px"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#475569",textTransform:"uppercase",marginBottom:12}}>Semana {activeWeek}</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {WEEK_PLAN.map((block,di) => {
            const W2 = WORKOUTS[block];
            const done = !!data[`${activeWeek}-${di}`];
            return (
              <div key={di} style={{background:done?W2.colorLight:"rgba(255,255,255,0.04)",border:`1px solid ${done?W2.color+"55":"rgba(255,255,255,0.08)"}`,borderRadius:16,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,transition:"all 0.2s"}}>
                <button onClick={()=>markDone(activeWeek,di)} style={{width:32,height:32,borderRadius:"50%",background:done?W2.color:"rgba(255,255,255,0.06)",border:`2px solid ${done?W2.color:"rgba(255,255,255,0.15)"}`,fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",color:"white"}}>
                  {done?"✓":""}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                    <span style={{fontSize:12,color:"#64748b"}}>{DAY_LABELS[di]}</span>
                    <span style={{fontSize:10,fontWeight:"700",color:W2.color,background:W2.colorLight,padding:"2px 8px",borderRadius:20}}>{W2.label}</span>
                  </div>
                  <div style={{fontSize:15,fontWeight:"700",color:done?"#94a3b8":"#f1f5f9"}}>{W2.subtitle}</div>
                </div>
                {!done
                  ? <button onClick={()=>startSession(activeWeek,di)} style={{padding:"10px 18px",borderRadius:12,fontSize:13,fontWeight:"700",background:W2.color,color:"#fff",flexShrink:0,boxShadow:`0 4px 16px ${W2.color}44`}}>Iniciar</button>
                  : <div style={{fontSize:22,flexShrink:0}}>✅</div>
                }
              </div>
            );
          })}
        </div>
      </div>

      {/* Heatmap */}
      <div style={{padding:"24px 24px 0"}}>
        <div style={{fontSize:10,letterSpacing:3,color:"#475569",textTransform:"uppercase",marginBottom:12}}>Histórico · 12 semanas</div>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16}}>
          <div style={{display:"flex",gap:3,marginBottom:6}}>
            <div style={{width:26}}/>
            {DAY_LABELS.map((d,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:"#334155"}}>{d}</div>)}
          </div>
          {[...Array(WEEKS)].map((_,wi) => {
            const w = wi+1;
            return (
              <div key={w} style={{display:"flex",gap:3,marginBottom:3,alignItems:"center"}}>
                <div style={{width:26,fontSize:9,color:activeWeek===w?"#60a5fa":"#334155",textAlign:"right",paddingRight:4,fontWeight:activeWeek===w?"700":"normal"}}>{w}</div>
                {WEEK_PLAN.map((block,di) => {
                  const done = !!data[`${w}-${di}`];
                  const W2 = WORKOUTS[block];
                  return <button key={di} onClick={()=>setActiveWeek(w)} style={{flex:1,aspectRatio:"1",borderRadius:3,background:done?W2.color:activeWeek===w?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.04)",border:"none",transition:"all 0.15s"}}/>;
                })}
              </div>
            );
          })}
          <div style={{display:"flex",gap:16,marginTop:12,justifyContent:"center"}}>
            {Object.entries(WORKOUTS).map(([k,W2])=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:10,height:10,borderRadius:2,background:W2.color}}/>
                <span style={{fontSize:10,color:"#475569"}}>{W2.label}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
